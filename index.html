<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메디힘 HR Gate</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <main class="gate-wrap">
    <section class="gate-card">
      <span class="gate-logo">MEDIHIM HR</span>
      <h1>HR 평가자료 접근</h1>
      <p>내부 검토용 후보자 평가 페이지입니다. 비밀번호 입력 후 HR 대시보드로 이동합니다.</p>
      <form onsubmit="handleLogin(event)">
        <label class="small" for="password">Access Password</label>
        <input class="gate-input" id="password" type="password" inputmode="numeric" autocomplete="off" placeholder="비밀번호 입력" autofocus />
        <div class="btn-row">
          <button class="btn" type="submit">HR 페이지 입장</button>
        </div>
        <div id="message" class="alert info">정적 HTML 비밀번호 게이트입니다. 민감 자료는 비공개 저장소 사용을 권장합니다.</div>
      </form>
    </section>
  </main>
  <script src="assets/js/auth.js"></script>
</body>
</html>
